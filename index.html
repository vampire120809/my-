<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Self Introduction</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #3a0f2e, #6a1b4d, #9c2d6f);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Segoe UI", sans-serif;
      color: white;
    }

    .card {
      background: rgba(0, 0, 0, 0.6);
      padding: 40px 60px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 20px hotpink;
      animation: float 3s ease-in-out infinite;
    }

    h1 {
      font-size: 2.8em;
      letter-spacing: 3px;
      margin-bottom: 10px;
      color: hotpink;
    }

    p {
      font-size: 1.2em;
      line-height: 1.8;
    }

    .line {
      width: 80px;
      height: 3px;
      background: hotpink;
      margin: 15px auto 25px auto;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>村上 聖奈</h1>
    <div class="line"></div>
    <p>
      はじめまして。<br>
      ダンスが大好きです。<br>
      楽しいことに全力で取り組むタイプです。<br>
      よろしくお願いします。
    </p>
  </div>

</body>
</html>
