<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Self Introduction</title>
  <style>
    body {
      margin: 0;
      height: 100vh;

      /* チェック柄背景 */
      background-color: #f5e6dc;
      background-image:
        linear-gradient(45deg, #e6d3c3 25%, transparent 25%),
        linear-gradient(-45deg, #e6d3c3 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e6d3c3 75%),
        linear-gradient(-45deg, transparent 75%, #e6d3c3 75%);
      background-size: 40px 40px;
      background-position: 0 0, 0 20px, 20px -20px, -20px 0px;

      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Segoe UI", "Arial Rounded MT Bold", sans-serif;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      padding: 50px 80px;
      border-radius: 30px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    h1 {
      font-size: 3em;
      letter-spacing: 5px;
      color: #8d6e63;
      margin-top: 20px;
    }

    .image {
      width: 180px;
      height: 180px;
      margin: 0 auto;
      border-radius: 20px;
      background: #f2dede;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 15px #e0bfbf;
    }

    svg {
      width: 120px;
      height: 120px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="image">
      <!-- 韓国カフェ風イラスト -->
      <svg viewBox="0 0 200 200">
        <!-- カップ -->
        <rect x="60" y="70" width="80" height="60" rx="15" fill="#d7bfae"/>
        <rect x="70" y="80" width="60" height="40" rx="10" fill="#f5ede6"/>

        <!-- 取っ手 -->
        <path d="M140 80
                 C165 80,165 120,140 120"
              stroke="#d7bfae" stroke-width="10" fill="none"/>

        <!-- 湯気 -->
        <path d="M80 60 C70 40,90 40,80 20" stroke="#b5838d" stroke-width="4" fill="none"/>
        <path d="M100 60 C90 40,110 40,100 20" stroke="#b5838d" stroke-width="4" fill="none"/>
        <path d="M120 60 C110 40,130 40,120 20" stroke="#b5838d" stroke-width="4" fill="none"/>

        <!-- ハート -->
        <path d="M150 50
                 C150 40,165 40,165 50
                 C165 60,150 70,150 70
                 C150 70,135 60,135 50
                 C135 40,150 40,150 50Z"
              fill="#e8a0a0"/>
      </svg>
    </div>

    <h1>村上 聖奈</h1>
  </div>

</body>
</html>
