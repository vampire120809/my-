<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Self Introduction</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #f3d1dc, #e5e5e5, #d6c6b8);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Arial Rounded MT Bold", "Segoe UI", sans-serif;
      color: #5a5a5a;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      padding: 40px 60px;
      border-radius: 28px;
      text-align: center;
      box-shadow: 0 0 20px #c8b6a6;
      animation: float 3s ease-in-out infinite;
    }

    h1 {
      font-size: 2.6em;
      letter-spacing: 3px;
      margin-bottom: 10px;
      color: #b5838d;
    }

    p {
      font-size: 1.1em;
      line-height: 1.9;
    }

    .line {
      width: 70px;
      height: 4px;
      background: #b7a99a;
      margin: 15px auto 25px auto;
      border-radius: 10px;
    }

    .heart {
      color: #b5838d;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>村上 聖奈</h1>
    <div class="line"></div>
    <p>
      はじめまして。<br>
      ダンスが大好きです。<br>
      楽しいことに全力で取り組むタイプです。<br>
      よろしくお願いします <span class="heart">♡</span>
    </p>
  </div>

</body>
</html>
