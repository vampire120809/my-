<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Self Introduction</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #f3d1dc, #e5e5e5, #d6c6b8);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Arial Rounded MT Bold", "Segoe UI", sans-serif;
      color: #5a5a5a;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      padding: 50px 80px;
      border-radius: 30px;
      text-align: center;
      box-shadow: 0 0 20px #c8b6a6;
      animation: float 3s ease-in-out infinite;
    }

    h1 {
      font-size: 3em;
      letter-spacing: 5px;
      color: #b5838d;
      margin-top: 20px;
    }

    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto;
      border-radius: 50%;
      background: #f7e3ea;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 10px #e0b5c2;
    }

    svg {
      width: 80px;
      height: 80px;
      fill: #b5838d;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">
      <!-- ダンスっぽいイラスト（SVG） -->
      <svg viewBox="0 0 64 64">
        <circle cx="32" cy="10" r="6"/>
        <path d="M32 18 L28 32 L20 46 L26 48 L34 34 L40 48 L46 46 L36 30 Z"/>
      </svg>
    </div>
    <h1>村上 聖奈</h1>
  </div>

</body>
</html>
